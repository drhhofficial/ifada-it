<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إفادة استكمال المتطلبات الإلكترونية</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #0a1628, #1a3a6e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  direction: rtl;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 16px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.5);
  overflow: hidden;
}

.card-header {
  background: linear-gradient(180deg, #1a3a6e, #0f2548);
  padding: 18px 24px;
  border-bottom: 3px solid #c9a84c;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.h-logo-fac  { height: 62px; width: auto; object-fit: contain; }
.h-logo-univ { height: 58px; width: 58px; object-fit: contain; border-radius: 50%; }
.h-text      { flex: 1; text-align: center; }
.h-text h1   { font-family: 'Amiri', serif; font-size: 16px; font-weight: 700; color: #fff; line-height: 1.6; }
.h-text p    { font-size: 10px; color: #c9a84c; margin-top: 3px; }

.card-body   { padding: 24px; }
.field-label { font-size: 12px; font-weight: 700; color: #1a3a6e; margin-bottom: 7px; display: block; }

.email-input {
  width: 100%;
  border: 1.5px solid #d4c9a8;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  font-family: 'Cairo', sans-serif;
  direction: ltr;
  color: #222;
  transition: border-color .2s;
  margin-bottom: 4px;
}
.email-input:focus { outline: none; border-color: #1a3a6e; }
.email-hint { font-size: 10px; color: #bbb; margin-bottom: 16px; direction: ltr; }

.btn-search {
  width: 100%;
  background: linear-gradient(135deg, #1a3a6e, #0f2548);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-search:hover    { opacity: .88; }
.btn-search:disabled { opacity: .5; cursor: not-allowed; }

.alert { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 12px; line-height: 1.7; }
.alert-error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
.alert-warning { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }

#resultArea { display: none; }

.badge-approved {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(45,122,79,.1);
  border: 1px solid rgba(45,122,79,.3);
  color: #166534;
  border-radius: 12px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 12px;
}

.member-card {
  background: #f7f3ea;
  border: 1px solid #e0d5b8;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 14px;
}
.member-name { font-family: 'Amiri', serif; font-size: 19px; font-weight: 700; color: #1a3a6e; }
.member-sub  { font-size: 11px; color: #888; margin-top: 3px; }

.data-rows { margin-bottom: 16px; }
.data-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 6px 0;
  border-bottom: 1px solid #f0ebe0;
  gap: 10px;
}
.data-row:last-child { border-bottom: none; }
.dr-label { font-size: 10px; font-weight: 700; color: #c9a84c; flex-shrink: 0; }
.dr-value { font-size: 11px; color: #333; direction: ltr; text-align: left; word-break: break-all; }

.btn-download {
  width: 100%;
  background: #c9a84c;
  color: #0a1628;
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
  transition: background .2s;
}
.btn-download:hover { background: #e8c97a; }

.btn-back {
  width: 100%;
  margin-top: 8px;
  background: transparent;
  color: #1a3a6e;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
}
.btn-back:hover { background: #f7f3ea; }

.card-footer {
  background: #f7f3ea;
  border-top: 1px solid #e8e0cc;
  padding: 9px 24px;
  text-align: center;
  font-size: 10px;
  color: #bbb;
}
</style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <div class="header-row">
      <img class="h-logo-fac"
           src="https://lh3.googleusercontent.com/d/1hK8INXCCIpDalbteVZmjCogmnikP-ik7"
           alt="كلية العلوم">
      <div class="h-text">
        <h1>إفادة استكمال المتطلبات الإلكترونية</h1>
        <p>وحدة تكنولوجيا المعلومات — كلية العلوم، جامعة طنطا</p>
      </div>
      <img class="h-logo-univ"
           src="https://lh3.googleusercontent.com/d/1cyFowrM2VuM6SPDR-wHtj4Sq42jjWpym"
           alt="جامعة طنطا">
    </div>
  </div>

  <div class="card-body">

    <div id="searchForm">
      <label class="field-label">أدخل بريدك الإلكتروني المؤسسي</label>
      <input type="email" class="email-input" id="emailInput"
             placeholder="example@science.tanta.edu.eg"
             onkeydown="if(event.key==='Enter') doSearch()">
      <p class="email-hint">مثال: dr.ibrahimsalem@science.tanta.edu.eg</p>
      <button class="btn-search" id="searchBtn" onclick="doSearch()">
        🔍 البحث عن إفادتي
      </button>
      <div id="alertArea"></div>
    </div>

    <div id="resultArea">
      <div class="badge-approved">✅ إفادتك جاهزة للتحميل</div>
      <div class="member-card">
        <div class="member-name" id="rName"></div>
        <div class="member-sub"  id="rSub"></div>
      </div>
      <div class="data-rows" id="rRows"></div>
      <button class="btn-download" onclick="downloadCert()">⬇️ تحميل الإفادة (PDF)</button>
      <button class="btn-back"     onclick="resetSearch()">← بحث بإيميل آخر</button>
    </div>

  </div>

  <div class="card-footer">
    صلاحية الإفادة عام من تاريخ الإصدار &nbsp;|&nbsp; وحدة تكنولوجيا المعلومات
  </div>

</div>

<script>
"use strict";

var LOGOS = {
  fac  : "https://lh3.googleusercontent.com/d/1hK8INXCCIpDalbteVZmjCogmnikP-ik7",
  univ : "https://lh3.googleusercontent.com/d/1cyFowrM2VuM6SPDR-wHtj4Sq42jjWpym",
  it   : "https://lh3.googleusercontent.com/d/1_jJHrn8X2iaAYsjhsJX4HFPyxFC4BXti"
};

var currentMember = null;
var currentConfig = null;

/* ── SEARCH ── */
function doSearch() {
  var email = document.getElementById("emailInput").value.trim();
  if (!email) { showAlert("أدخل البريد الإلكتروني أولاً", "warning"); return; }

  var btn = document.getElementById("searchBtn");
  btn.disabled = true;
  btn.textContent = "⏳ جاري البحث...";
  clearAlert();

  google.script.run
    .withSuccessHandler(onResult)
    .withFailureHandler(function(e) {
      showAlert("حدث خطأ: " + e.message, "error");
      btn.disabled = false;
      btn.textContent = "🔍 البحث عن إفادتي";
    })
    .getMemberByEmail(email);
}

function onResult(data) {
  var btn = document.getElementById("searchBtn");
  btn.disabled = false;
  btn.textContent = "🔍 البحث عن إفادتي";

  if (data.error) {
    showAlert(data.error, "error"); return;
  }
  if (!data.found) {
    showAlert("لم يتم العثور على بيانات بهذا البريد الإلكتروني.<br>تأكد من الإيميل أو تواصل مع وحدة تكنولوجيا المعلومات.", "error"); return;
  }
  if (!data.approved) {
    showAlert("بياناتك موجودة لكن <strong>لم تُعتمد بعد</strong>.<br>تواصل مع وحدة تكنولوجيا المعلومات.", "warning"); return;
  }

  currentMember = data.member;
  currentConfig = data.config || {};
  renderResult();
}

function renderResult() {
  var m = currentMember;
  document.getElementById("searchForm").style.display = "none";
  document.getElementById("resultArea").style.display = "block";
  document.getElementById("rName").textContent = m.name || "";
  document.getElementById("rSub").textContent  = [m.rank, m.dept, m.faculty].filter(Boolean).join(" — ");

  var fields = [
    ["الاسم بالإنجليزية",  m.name_en     ],
    ["البريد الإلكتروني",   m.email        ],
    ["عدد الأبحاث",         m.pub_count    ],
    ["Scopus",              m.scopus_url   ],
    ["Scopus ID",           m.scopus_id    ],
    ["ORCID",               m.orcid        ],
    ["Google Scholar",      m.scholar      ],
    ["ResearchGate",        m.researchgate ],
    ["WOS",                 m.wos_url      ],
    ["WOS Res. ID",         m.wos_id       ]
  ].filter(function(f) { return f[1]; });

  document.getElementById("rRows").innerHTML = fields.map(function(f) {
    return '<div class="data-row">' +
             '<span class="dr-label">' + f[0] + '</span>' +
             '<span class="dr-value">' + esc(f[1]) + '</span>' +
           '</div>';
  }).join("");
}

function resetSearch() {
  currentMember = null;
  currentConfig = null;
  document.getElementById("resultArea").style.display  = "none";
  document.getElementById("searchForm").style.display  = "block";
  document.getElementById("emailInput").value = "";
  clearAlert();
}

/* ── ALERTS ── */
function showAlert(html, type) {
  document.getElementById("alertArea").innerHTML =
    '<div class="alert alert-' + type + '">' + html + '</div>';
}
function clearAlert() {
  document.getElementById("alertArea").innerHTML = "";
}

/* ── CERTIFICATE ── */
function downloadCert() {
  if (!currentMember) return;
  var win = window.open("", "_blank", "width=900,height=820,scrollbars=yes");
  if (!win) {
    showAlert("يُرجى السماح بالنوافذ المنبثقة في المتصفح ثم حاول مرة أخرى.", "warning");
    return;
  }
  win.document.open();
  win.document.write(buildCert(currentMember, currentConfig || {}));
  win.document.close();
}

function buildCert(m, cfg) {
  var today  = new Date();
  var DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var dateStr = DAYS[today.getDay()] + ", " + today.getDate() + " " + MONTHS[today.getMonth()] + " " + today.getFullYear();
  var serial  = "IT-" + today.getFullYear() + "-" + ("000" + (m.rowIndex || 1)).slice(-4);

  var IT_MGR   = cfg.IT_MANAGER || "مدير وحدة تكنولوجيا المعلومات";
  var DEAN     = cfg.DEAN_NAME  || "عميد الكلية";
  var VALIDITY = cfg.VALIDITY   || "صلاحية الإفادة عام من تاريخ الإصدار";
  var UNIV     = cfg.UNIVERSITY || "جامعة طنطا";
  var UNIT_EN  = cfg.UNIT_EN    || "Information Technology Unit, Faculty of Science, Tanta University";

  var nameLine = [m.name, m.rank,
    m.dept    ? "بقسم " + m.dept : null,
  ].filter(Boolean).join(" — ");

  var rows = [
    ["الاسم العلمي بالإنجليزية", m.name_en     ],
    ["الكليـة / القسم",          [m.faculty, m.dept].filter(Boolean).join(" — ")],
    ["الإيميـل المؤسسي",         m.email        ],
    ["رابط الصفحة الشخصية",      m.personal_url ],
    ["عدد الأبحاث المنشورة",     m.pub_count    ],
    ["Scopus",                   m.scopus_url   ],
    ["Scopus ID",                m.scopus_id    ],
    ["ORCID No",                 m.orcid        ],
    ["Google Scholar",           m.scholar      ],
    ["Research Gate",            m.researchgate ],
    ["WOS (Clarivate)",          m.wos_url      ],
    ["WOS Res. ID",              m.wos_id       ]
  ].filter(function(r) { return r[1]; });

  var tableHTML = rows.map(function(r, i) {
    var bg = i % 2 === 0 ? "#f7f3ea" : "#ffffff";
    return "<tr style='background:" + bg + "'>" +
             "<td class='td-lbl'>" + r[0] + "</td>" +
             "<td class='td-sep'>:</td>" +
             "<td class='td-val'>" + esc(r[1]) + "</td>" +
           "</tr>";
  }).join("");

  return "<!DOCTYPE html><html lang='ar' dir='rtl'><head>" +
  "<meta charset='UTF-8'>" +
  "<link href='https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap' rel='stylesheet'>" +
  "<style>" +
  "* { margin:0; padding:0; box-sizing:border-box; }" +
  "body { background:#666; display:flex; justify-content:center; padding:30px; }" +
  "@media print { body { background:#fff; padding:0; } @page { size:A4 portrait; margin:0; } }" +
  ".page { width:794px; height:1123px; background:#fff; direction:rtl; position:relative; overflow:hidden; font-family:'Amiri','Cairo',Arial,sans-serif; }" +
  ".fo { position:absolute; inset:14px; border:2px solid #1a3a6e; }" +
  ".fi { position:absolute; inset:5px; border:0.75px solid #c9a84c; overflow:hidden; display:flex; flex-direction:column; }" +
  ".c-hdr { background:linear-gradient(180deg,#1a3a6e,#0f2548); padding:16px 28px 14px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0; }" +
  ".lg-fac  { height:100px; width:auto; object-fit:contain; flex-shrink:0; }" +
  ".lg-univ { height:100px; width:100px; object-fit:contain; border-radius:50%; flex-shrink:0; }" +
  ".c-hdr-txt { flex:1; text-align:center; padding:0 10px; }" +
  ".c-tar { font-family:'Amiri',serif; font-size:18px; font-weight:700; color:#000; line-height:1.6; margin-bottom:4px; }" +
  ".c-ten { font-family:'Cairo',sans-serif; font-size:13px; color:#c9a84c; letter-spacing:.4px; line-height:1.4; }" +
  ".c-dot { width:100%; border:none; border-top:2px dashed #1a3a6e; flex-shrink:0; }" +
  ".c-ttl-wrap { text-align:center; padding:14px 40px 6px; flex-shrink:0; }" +
  ".c-ttl { font-family:'Amiri',serif; font-size:26px; font-weight:700; color:#1a3a6e; display:inline-block; border-bottom:2px solid #c9a84c; padding-bottom:5px; margin-bottom:6px; }" +
  ".c-val { font-family:'Cairo',sans-serif; font-size:11px; color:#999; font-style:italic; }" +
  ".c-intro { font-family:'Amiri',serif; font-size:16px; color:#000; line-height:2.1; margin:10px 36px 12px; text-align:justify; flex-shrink:0; }" +
  ".c-tbl { width:calc(100% - 72px); margin:0 36px 12px; border-collapse:collapse; font-family:'Cairo',sans-serif;font-size:16px; flex-shrink:0; }" +
  ".c-tbl td { padding:7px 10px; font-size:14px; border-bottom:1px solid #e8e0cc; vertical-align:middle; line-height:1.15; }" +
  ".c-tbl tr:last-child td { border-bottom:none; }" +
  ".td-lbl { font-weight:700; color:#1a3a6e; white-space:nowrap; width:168px; text-align:right; }" +
  ".td-sep { width:16px; text-align:center; color:#bbb; }" +
  ".td-val { color:#000; word-break:break-all; direction:ltr; text-align:left; font-size:12px; }" +
  ".c-disc { font-family:'Amiri',serif; font-size:16px; color:#000; line-height:2; margin:0 36px 14px; text-align:justify; border-top:1px solid #e0d5b8; padding-top:10px; flex-shrink:0; }" +
  ".c-sigs { display:flex; justify-content:space-between; margin:0 36px 12px; gap:40px; flex-shrink:0; }" +
  ".c-sig { flex:1; text-align:center; }" +
  ".sig-post { font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; color:#1a3a6e; line-height:1.7; margin:0; }" +
  ".sig-space { height:22px; }" +
  ".sig-line { border-top:1px solid #999; margin-bottom:6px; }" +
  ".sig-name { font-family:'Amiri',serif; font-size:19px; color:#222; line-height:1.5; }" +
  ".c-stamp { text-align:center; font-family:'Amiri',serif; font-size:13px; font-weight:700; color:#1a3a6e; margin:0 36px; border:1px dashed #c9a84c; padding:8px 20px; border-radius:4px; background:#fffdf5; flex-shrink:0; }" +
  ".c-it-wrap { display:flex; justify-content:center; align-items:center; padding:8px 0 6px; flex-shrink:0; }" +
  ".c-it-logo { height:70px; width:auto; object-fit:contain; }" +
  ".c-ftr { position:absolute; bottom:0; left:0; right:0; height:44px; background:#1a3a6e; display:flex; align-items:center; justify-content:space-between; padding:0 36px; }" +
  ".f-date { font-family:'Cairo',sans-serif; font-size:12px; color:#c9a84c; font-weight:700; }" +
  ".f-ser  { font-family:'Cairo',sans-serif; font-size:12px; color:#8899bb; }" +
  "</style></head><body>" +
  "<div class='page'><div class='fo'><div class='fi'>" +

  "<div class='c-hdr'>" +
    "<img class='lg-fac'  src='" + LOGOS.fac  + "' alt='كلية العلوم'>" +
    "<div class='c-hdr-txt'>" +
      "<div class='c-tar'>وحـدة تكنولوجيا المعلومات - كليـة العلوم " + UNIV + "</div>" +
      "<div class='c-ten'>" + UNIT_EN + "</div>" +
    "</div>" +
    "<img class='lg-univ' src='" + LOGOS.univ + "' alt='" + UNIV + "'>" +
  "</div>" +

  "<div class='c-dot'></div>" +

  "<div class='c-ttl-wrap'>" +
    "<h2 class='c-ttl'>إفادة استكمال المتطلبات الإلكترونية</h2>" +
    "<p class='c-val'>" + VALIDITY + "</p>" +
  "</div>" +

  "<p class='c-intro'>تُفيد وحدة تكنولوجيا المعلومات بالكلية بأن السيد/ <strong>" + esc(nameLine) + "</strong>، قد استوفى كافة المتطلبات الإلكترونية اللازمة والمتمثلة في الآتي:</p>" +

  "<table class='c-tbl'><tbody>" + tableHTML + "</tbody></table>" +

  "<p class='c-disc'>حُررت هذه الإفادة بناءً على طلب سيادته لتقديمها إلى من يهمه الأمر، مع تحمله المسؤولية التامة عن صحة البيانات المذكورة، دون تحمل وحدة تكنولوجيا المعلومات أي التزامات ناتجة عنها.</p>" +

  "<div class='c-sigs'>" +
    "<div class='c-sig'>" +
      "<p class='sig-post'>مدير وحدة تكنولوجيا المعلومات</p>" +
      "<div class='sig-space'></div>" +
      "<div class='sig-line'></div>" +
      "<p class='sig-name'>" + esc(IT_MGR) + "</p>" +
    "</div>" +
    "<div class='c-sig'>" +
      "<p class='sig-post'>يعتمد،،</p>" +
      "<p class='sig-post'>عميد الكلية</p>" +
      "<div class='sig-space'></div>" +
      "<div class='sig-line'></div>" +
      "<p class='sig-name'>" + esc(DEAN) + "</p>" +
    "</div>" +
  "</div>" +

  "<p class='c-stamp'>يجب ختم الاستمارة من وحدة تكنولوجيا المعلومات ثم ختم الكلية</p>" +

  "<div class='c-it-wrap'><img class='c-it-logo' src='" + LOGOS.it + "' alt='وحدة IT'></div>" +

  "<div class='c-ftr'>" +
    "<span class='f-date'>تاريـخ الإصدار: " + dateStr + "</span>" +
    "<span class='f-ser'>رقم الوثيقة: " + serial + "</span>" +
  "</div>" +

  "</div></div></div>" +
  "<script>window.onload=function(){setTimeout(function(){window.print();},1200);}<\/script>" +
  "</body></html>";
}

/* ── HELPERS ── */
function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>

</body>
</html>
